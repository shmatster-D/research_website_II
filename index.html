<style>
  /* ---------- Tokens ---------- */
  :root{
    --ink:#e8e9ee;
    --ink-70:rgba(232,233,238,.7);
    --paper:#1b1c22;
    --panel:#24252b;
    --line:rgba(232,233,238,.12);
    --line-strong:rgba(232,233,238,.28);
    --teal:#7806ea;
    --teal-deep:#b48cff;
    --clay:#f0904f;
    --muted:#9a9dad;
    --shadow:0 10px 28px rgba(0,0,0,.45);
    --font-display:'Fraunces', serif;
    --font-body:'Source Sans 3', system-ui, -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, monospace;
  }

  /* ---------- Reset ---------- */
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:linear-gradient(180deg, #0d0b14 0%, #0d0b14 60%, #7806ea 100%) fixed;
    color:var(--ink);
    font-family:var(--font-body);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  button{ font:inherit; }
  a{ color:inherit; }
  img{ max-width:100%; }
  :focus-visible{ outline:2px solid var(--clay); outline-offset:2px; }

  .page{ max-width:880px; margin:0 auto; padding:48px 24px 90px; position:relative; z-index:1; }

  /* ---------- Smoke background ---------- */
  .smoke-layer{ position:fixed; inset:0; overflow:hidden; z-index:0; pointer-events:none; }
  .smoke{
    position:absolute;
    bottom:-25%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(170,110,255,.55) 0%, rgba(120,6,234,.28) 45%, rgba(120,6,234,0) 72%);
    filter:blur(30px);
    opacity:0;
    mix-blend-mode:screen;
    animation:smokeRise 24s ease-in infinite;
  }
  .smoke-1{ left:4%;  width:300px; height:300px; animation-duration:24s; animation-delay:0s;  --drift:-40px; }
  .smoke-2{ left:20%; width:420px; height:420px; animation-duration:31s; animation-delay:5s;  --drift:55px; }
  .smoke-3{ left:42%; width:260px; height:260px; animation-duration:19s; animation-delay:9s;  --drift:-25px; }
  .smoke-4{ left:61%; width:380px; height:380px; animation-duration:28s; animation-delay:2s;  --drift:35px; }
  .smoke-5{ left:80%; width:320px; height:320px; animation-duration:22s; animation-delay:12s; --drift:-45px; }
  .smoke-6{ left:70%; width:240px; height:240px; animation-duration:26s; animation-delay:16s; --drift:20px; }

  @keyframes smokeRise{
    0%{ transform:translate(0,0) scale(.85); opacity:0; }
    12%{ opacity:.55; }
    50%{ transform:translate(var(--drift, 0px), -55vh) scale(1.15); opacity:.32; }
    100%{ transform:translate(calc(var(--drift, 0px) * -1), -115vh) scale(1.5); opacity:0; }
  }

  /* ---------- Entrance animation ---------- */
  @keyframes fadeInUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .profile-header{ animation:fadeInUp 0.4s ease-out both; }
  .tabs, .panel-wrap{ animation:fadeInUp 0.4s ease-out 0.2s both; }

  /* ---------- Header ---------- */
  .profile-header{
    display:flex;
    gap:28px;
    align-items:flex-start;
    padding:28px 28px 36px;
    margin-bottom:8px;
    /* background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px); */
    background-size:26px 26px;
    background-position:center top;
  }
  .avatar{
    width:128px; height:128px; flex-shrink:0;
    border-radius:50%;
    border:2px solid var(--ink);
    background:linear-gradient(135deg, var(--teal), var(--teal-deep));
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display);
    font-size:40px; font-weight:600;
    overflow:hidden;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .identity{ flex:1; min-width:300px; }
  .name{ font-family:var(--font-display); font-size:32px; font-weight:600; margin:2px 0 4px; }
  .role{ color:var(--muted); font-size:15px; margin:0 0 18px; }
  .contact-list{ display:flex; flex-direction:column; gap:7px; }
  .contact-row{ display:flex; gap:12px; align-items:baseline; font-size:14px; }
  .contact-label{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--teal-deep); width:62px; flex-shrink:0;
  }
  .contact-value a{ text-decoration:none; border-bottom:1px solid transparent; }
  .contact-value a:hover{ border-bottom-color:var(--teal-deep); color:var(--teal-deep); }

  .link-tiles{ display:flex; gap:12px; flex-shrink:0; }
  .link-tile{
    width:84px; height:84px;
    border:1.5px solid var(--ink);
    background:var(--panel);
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:6px;
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:.03em;
    text-transform:uppercase; text-decoration:none; color:var(--ink);
    transition:transform .15s ease, background-color .15s ease, color .15s ease, box-shadow .15s ease;
  }
  .link-tile:hover{ background:var(--teal); border-color:var(--teal); color:#fff; transform:translateY(-2px); box-shadow:var(--shadow); }

  @media (max-width:640px){
    .profile-header{ flex-direction:column; align-items:center; text-align:center; }
    .identity{ display:flex; flex-direction:column; align-items:center; }
    .contact-row{ justify-content:center; }
    .link-tiles{ align-self:center; }
  }

  /* ---------- Tabs ---------- */
  .tabs{ display:flex; gap:6px; margin:0; padding:0 0 0 2px; list-style:none; overflow-x:auto; overflow-y:hidden; }
  .tab-btn{
    font-family:var(--font-display); font-size:16px; font-weight:600;
    padding:11px 22px; border:1.0px solid var(--ink); border-radius:5px 5px 0 0;
    background:var(--paper); color:var(--ink-70); cursor:pointer; white-space:nowrap;
    position:relative; transform:translateY(2px);
    transition:transform .15s ease, background-color .15s ease, color .15s ease, border-color .15s ease;
  }
  .tab-btn:hover{ color:var(--ink); background:#2e2f37; }
  .tab-btn[aria-selected="true"]{
    background:var(--panel); color:var(--ink); border-bottom-color:var(--panel);
    transform:translateY(0); z-index:3; box-shadow:inset 0 3px 0 var(--clay);
  }

  /* ---------- Panel ---------- */
  .panel-wrap{ border:1.5px solid var(--ink); background:var(--panel); padding:40px; position:relative; z-index:1; }
  .panel[hidden]{ display:none; }
  .panel h2{ font-family:var(--font-display); font-size:26px; margin:0 0 16px; }
  .panel h3{ font-family:var(--font-display); font-size:20px; margin:28px 0 10px; }
  .panel h4{ font-family:var(--font-display); font-size:17px; margin:20px 0 8px; }
  .panel p{ margin:0 0 16px; }
  .panel ul{ margin:0 0 16px 20px; padding:0; }
  .panel li{ margin-bottom:6px; }
  .panel img{ border:1.5px solid var(--ink); margin:10px 0 18px; display:block; }
  .panel a{ color:var(--teal-deep); text-decoration-color:rgba(91,63,160,.4); }
  .panel a:hover{ text-decoration-color:var(--teal-deep); }
  .panel code{ font-family:var(--font-mono); background:rgba(232,233,238,.10); padding:2px 5px; border-radius:3px; font-size:.9em; }
  .panel-intro{ color:var(--muted); font-size:15px; margin-bottom:26px; padding-bottom:20px; border-bottom:1px dashed var(--line-strong); }

  /* ---------- Research accordion ---------- */
  .project{ border:1.5px solid var(--ink); margin-bottom:14px; background:#2a2b32; }
  .project-toggle{
    width:100%; display:flex; justify-content:space-between; align-items:flex-start; gap:16px;
    padding:16px 20px; background:none; border:none; cursor:pointer; text-align:left;
  }
  .project-title{ font-family:var(--font-display); font-size:17px; font-weight:600; }
  .project-meta{ display:block; margin-top:5px; font-family:var(--font-mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--teal-deep); font-weight:500; }
  .project-indicator{ font-family:var(--font-mono); font-size:22px; line-height:1; color:var(--clay); flex-shrink:0; width:18px; text-align:center; }
  .project-body{ padding:2px 20px 20px; border-top:1px dashed var(--line-strong); }
  .project-body[hidden]{ display:none; }

  /* ---------- Gallery ---------- */
  .gallery-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:14px; }
  .gallery-item{
    border:1.5px solid var(--ink); cursor:pointer; padding:0; background:none;
    aspect-ratio:1/1; overflow:hidden; position:relative; display:block; width:100%;
  }
  .gallery-item img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .2s ease; }
  .gallery-item:hover img{ transform:scale(1.05); }
  .gallery-caption{
    position:absolute; left:0; right:0; bottom:0; padding:9px 10px;
    background:linear-gradient(to top, rgba(36,37,44,.88), transparent);
    color:#fff; font-family:var(--font-mono); font-size:11px; text-align:left;
  }
  .gallery-badge{
    position:absolute; top:8px; right:8px; background:var(--clay); color:#fff;
    font-family:var(--font-mono); font-size:9.5px; padding:2px 6px;
    text-transform:uppercase; letter-spacing:.05em;
  }

  /* ---------- Lightbox ---------- */
  .lightbox{ position:fixed; inset:0; background:rgba(36,37,44,.92); display:flex; align-items:center; justify-content:center; padding:32px; z-index:50; }
  .lightbox[hidden]{ display:none; }
  .lightbox-content{ max-width:820px; width:100%; max-height:86vh; background:var(--panel); border:1.5px solid var(--ink); padding:22px; position:relative; overflow-y:auto; }
  .lightbox-content img, .lightbox-content video{ width:100%; max-height:62vh; object-fit:contain; display:block; border:1px solid var(--line-strong); background:#000; }
  .lightbox-caption{ margin-top:14px; font-family:var(--font-mono); font-size:13px; color:var(--muted); }
  .lightbox-note{ margin-top:8px; font-size:12.5px; color:var(--muted); font-style:italic; }
  .lightbox-close{
    position:absolute; top:-16px; right:-16px; width:36px; height:36px; border-radius:50%;
    background:var(--panel); color:var(--ink); border:1.5px solid var(--ink); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .lightbox-close:hover{ background:var(--clay); color:#1b1c22; border-color:var(--clay); }

  /* ---------- Blog ---------- */
  .post-list{ display:flex; flex-direction:column; gap:22px; }
  .post-summary{ border-bottom:1px dashed var(--line-strong); padding-bottom:20px; }
  .post-date{ font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal-deep); }
  .post-title-btn{
    display:block; background:none; border:none; padding:6px 0 8px; text-align:left; cursor:pointer;
    font-family:var(--font-display); font-size:21px; font-weight:600; color:var(--ink);
  }
  .post-title-btn:hover{ color:var(--teal-deep); text-decoration:underline; }
  .post-excerpt{ color:var(--muted); margin:0; }
  .back-link{
    font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--teal-deep); background:none; border:none; cursor:pointer; padding:0;
    margin-bottom:22px; display:inline-flex; gap:6px; align-items:center;
  }
  .back-link:hover{ text-decoration:underline; }
  .post-full .post-date{ display:block; margin-bottom:6px; }

  /* ---------- Footer ---------- */
  .site-footer{ margin-top:40px; text-align:center; font-family:var(--font-mono); font-size:11px; color:var(--muted); letter-spacing:.04em; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; scroll-behavior:auto !important; }
  }
</style>
</head>

     Tiny placeholder-image generator (inline SVG data URI).

  --------------------------------------------------- */
  function ph(label, color, w, h){
    w = w || 480; h = h || 320;
    var safe = String(label).replace(/&/g,'&amp;').replace(/</g,'&lt;');
    var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + w + "' height='" + h + "'>" +
      "<rect width='100%' height='100%' fill='#" + color + "'/>" +
      "<text x='50%' y='50%' font-family='monospace' font-size='16' fill='#ffffff' " +
      "text-anchor='middle' dominant-baseline='middle'>" + safe + "</text></svg>";
    return "data:image/svg+xml," + encodeURIComponent(svg);
  }

  /* ---------------------------------------------------
     Minimal markdown renderer — headings, bold/italic,
     links, images, inline code, and bullet lists.
     Enough to let any panel below "support rich markdown
     format" (the brief's words) without an external library.
  --------------------------------------------------- */
  function inline(text){
    text = text.replace(/!\[([^\]]*)\]\(((?:[^()]|\([^()]*\))*)\)/g, '<img src="$2" alt="$1" loading="lazy">');
    text = text.replace(/\[([^\]]+)\]\(((?:[^()]|\([^()]*\))*)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    return text;
  }

  function renderMarkdown(md){
    var lines = md.trim().split('\n');
    var html = '', para = [], inList = false;

    function flushPara(){
      if (para.length){ html += '<p>' + inline(para.join(' ')) + '</p>'; para = []; }
    }

    lines.forEach(function(raw){
      var line = raw.trim();
      if (line === ''){
        flushPara();
        if (inList){ html += '</ul>'; inList = false; }
        return;
      }
      var h = line.match(/^(#{1,4})\s+(.*)/);
      if (h){
        flushPara();
        if (inList){ html += '</ul>'; inList = false; }
        var level = Math.min(h[1].length + 1, 4);
        html += '<h' + level + '>' + inline(h[2]) + '</h' + level + '>';
        return;
      }
      var li = line.match(/^[-*]\s+(.*)/);
      if (li){
        flushPara();
        if (!inList){ html += '<ul>'; inList = true; }
        html += '<li>' + inline(li[1]) + '</li>';
        return;
      }
      para.push(line);
    });
    flushPara();
    if (inList) html += '</ul>';
    return html;
  }

      "machine to run on *another* machine. Some recurring themes:\n\n" +
      "- Containers help, but only if someone keeps the Dockerfile honest\n" +
      "- A pinned dependency list beats a friendly README every time\n" +
      "- The most reproducible papers had the smallest, most boring codebases\n\n" +
      "I came away convinced that reproducibility is mostly a discipline problem, not a tooling problem."
    },
    {
      title: "Starting a postdoc",
      date: "2026-01-08",
      excerpt: "First week notes from joining the Systems Lab at Linden, and what I'm hoping to spend the next two years on.",
      md: "I started at Linden's Systems Lab this week. The plan, loosely: spend the next two years " +
      "figuring out how much of the \"glue code\" between research models and production systems can be " +
      "made boring and automatic rather than clever and bespoke.\n\n" +
      "More notes here as the work progresses."
    }
  ];

  /* ---------------------------------------------------
     Tabs
  --------------------------------------------------- */
  var tabButtons = Array.prototype.slice.call(document.querySelectorAll('.tab-btn'));
  var panels = {
    about: document.getElementById('panel-about'),
    research: document.getElementById('panel-research'),
    gallery: document.getElementById('panel-gallery'),
    blog: document.getElementById('panel-blog')
  };

  function selectTab(name){
    tabButtons.forEach(function(btn){
      var match = btn.dataset.tab === name;
      btn.setAttribute('aria-selected', match ? 'true' : 'false');
      btn.tabIndex = match ? 0 : -1;
    });
    Object.keys(panels).forEach(function(key){
      panels[key].hidden = key !== name;
    });
  }

  tabButtons.forEach(function(btn, i){
    btn.addEventListener('click', function(){ selectTab(btn.dataset.tab); });
    btn.addEventListener('keydown', function(e){
      var dir = (e.key === 'ArrowRight') ? 1 : (e.key === 'ArrowLeft') ? -1 : 0;
      if (!dir) return;
      e.preventDefault();
      var next = tabButtons[(i + dir + tabButtons.length) % tabButtons.length];
      next.focus();
      selectTab(next.dataset.tab);
    });
  });

  /* ---------------------------------------------------
     About
  --------------------------------------------------- */
  panels.about.innerHTML = renderMarkdown(aboutMd);

  /* ---------------------------------------------------
     Research — accordion, one dropdown per project
  --------------------------------------------------- */
  var researchHtml = '<p class="panel-intro">Selected ongoing and completed projects. Select a title to expand details.</p>';
  projects.forEach(function(p, i){
    researchHtml +=
      '<div class="project">' +
        '<button class="project-toggle" aria-expanded="false" aria-controls="project-body-' + i + '">' +
          '<span><span class="project-title">' + p.title + '</span>' +
          '<span class="project-meta">' + p.status + ' · ' + p.period + '</span></span>' +
          '<span class="project-indicator" aria-hidden="true">+</span>' +
        '</button>' +
        '<div class="project-body" id="project-body-' + i + '" hidden></div>' +
      '</div>';
  });
  panels.research.innerHTML = researchHtml;

  panels.research.querySelectorAll('.project-toggle').forEach(function(btn, i){
    btn.addEventListener('click', function(){
      var body = document.getElementById('project-body-' + i);
      var open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', open ? 'false' : 'true');
      btn.querySelector('.project-indicator').textContent = open ? '+' : '\u2013';
      body.hidden = open;
      if (!open && !body.dataset.rendered){
        body.innerHTML = renderMarkdown(projects[i].md);
        body.dataset.rendered = '1';
      }
    });
  });

  /* ---------------------------------------------------
     Gallery — tiled grid, opens lightbox on click
     (photos enlarge, videos play)
  --------------------------------------------------- */
  var galleryHtml = '<p class="panel-intro">A tiling of photos and videos — select any tile to enlarge or play it.</p><div class="gallery-grid">';
  galleryItems.forEach(function(item, i){
    var thumb = ph(item.title, item.color, 400, 400);
    galleryHtml +=
      '<button class="gallery-item" data-index="' + i + '" aria-label="Open ' + item.title + '">' +
        '<img src="' + thumb + '" alt="' + item.title + '" loading="lazy">' +
        '<span class="gallery-badge">' + item.type + '</span>' +
        '<span class="gallery-caption">' + item.title + '</span>' +
      '</button>';
  });
  galleryHtml += '</div>';
  panels.gallery.innerHTML = galleryHtml;

  var lightbox = document.getElementById('lightbox');
  var lightboxMedia = document.getElementById('lightbox-media');
  var lightboxCaption = document.getElementById('lightbox-caption');
  var lightboxClose = document.getElementById('lightbox-close');
  var lastFocused = null;

  function openLightbox(item){
    lastFocused = document.activeElement;
    if (item.type === 'video'){
      var video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.poster = ph(item.title, item.color, 800, 450);
      if (item.video){
        var source = document.createElement('source');
        source.src = item.video;
        video.appendChild(source);
      }
      lightboxMedia.innerHTML = '';
      lightboxMedia.appendChild(video);
      lightboxCaption.innerHTML = item.title + (item.video ? '' :
        '<br><span class="lightbox-note">Add a video file path to this item\'s `video` field in the code to enable playback.</span>');
    } else {
      lightboxMedia.innerHTML = '<img src="' + ph(item.title, item.color, 900, 560) + '" alt="' + item.title + '">';
      lightboxCaption.textContent = item.title;
    }
    lightbox.hidden = false;
    lightboxClose.focus();
  }

  function closeLightbox(){
    lightbox.hidden = true;
    lightboxMedia.innerHTML = '';
    if (lastFocused) lastFocused.focus();
  }

  panels.gallery.querySelectorAll('.gallery-item').forEach(function(btn){
    btn.addEventListener('click', function(){
      openLightbox(galleryItems[Number(btn.dataset.index)]);
    });
  });
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', function(e){ if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && !lightbox.hidden) closeLightbox();
  });

  /* ---------------------------------------------------
     Blog — plain text posts, click a title to read it
  --------------------------------------------------- */
  function formatDate(iso){
    var d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  }

  function renderBlogList(){
    var html = '<div class="post-list">';
    posts.forEach(function(post, i){
      html +=
        '<article class="post-summary">' +
          '<span class="post-date">' + formatDate(post.date) + '</span>' +
          '<button class="post-title-btn" data-index="' + i + '">' + post.title + '</button>' +
          '<p class="post-excerpt">' + post.excerpt + '</p>' +
        '</article>';
    });
    html += '</div>';
    panels.blog.innerHTML = html;
    panels.blog.querySelectorAll('.post-title-btn').forEach(function(btn){
      btn.addEventListener('click', function(){ renderBlogPost(Number(btn.dataset.index)); });
    });
  }

  function renderBlogPost(i){
    var post = posts[i];
    panels.blog.innerHTML =
      '<div class="post-full">' +
        '<button class="back-link">&larr; All posts</button>' +
        '<span class="post-date">' + formatDate(post.date) + '</span>' +
        '<h2>' + post.title + '</h2>' +
        renderMarkdown(post.md) +
      '</div>';
    panels.blog.querySelector('.back-link').addEventListener('click', renderBlogList);
  }

  renderBlogList();

  /* Initial tab on load */
  selectTab('about');
})();
</script>
</body>
</html>
