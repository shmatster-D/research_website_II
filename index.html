<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dante Lamenza Naylor — Research &amp; Notes</title>
<meta name="description" content="Personal academic site: about, research, gallery, and blog.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ---------- Tokens ---------- */
  :root{
    --ink:#e8e9ee;
    --ink-70:rgba(232,233,238,.7);
    --paper:#1b1c22;
    --panel:#24252b;
    --line:rgba(232,233,238,.12);
    --line-strong:rgba(232,233,238,.28);
    --teal:#7806ea;
    --teal-deep:#b48cff;
    --clay:#f0904f;
    --muted:#9a9dad;
    --shadow:0 10px 28px rgba(0,0,0,.45);
    --font-display:'Fraunces', serif;
    --font-body:'Source Sans 3', system-ui, -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, monospace;
  }

  /* ---------- Reset ---------- */
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:linear-gradient(180deg, #0d0b14 0%, #0d0b14 60%, #7806ea 100%) fixed;
    color:var(--ink);
    font-family:var(--font-body);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  button{ font:inherit; }
  a{ color:inherit; }
  img{ max-width:100%; }
  :focus-visible{ outline:2px solid var(--clay); outline-offset:2px; }

  .page{ max-width:880px; margin:0 auto; padding:48px 24px 90px; position:relative; z-index:1; }

  /* ---------- Fluid smoke background ---------- */
  #fluid-canvas{ position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; display:block; }

  /* ---------- Entrance animation ---------- */
  @keyframes fadeInUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .profile-header{ animation:fadeInUp 0.4s ease-out both; }
  .tabs, .panel-wrap{ animation:fadeInUp 0.4s ease-out 0.2s both; }

  /* ---------- Header ---------- */
  .profile-header{
    display:flex;
    gap:28px;
    align-items:flex-start;
    padding:28px 28px 36px;
    margin-bottom:8px;
    /* background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px); */
    background-size:26px 26px;
    background-position:center top;
  }
  .avatar{
    width:128px; height:128px; flex-shrink:0;
    border-radius:50%;
    border:2px solid var(--ink);
    background:linear-gradient(135deg, var(--teal), var(--teal-deep));
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display);
    font-size:40px; font-weight:600;
    overflow:hidden;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .identity{ flex:1; min-width:300px; }
  .name{ font-family:var(--font-display); font-size:32px; font-weight:600; margin:2px 0 4px; }
  .role{ color:var(--muted); font-size:15px; margin:0 0 18px; }
  .contact-list{ display:flex; flex-direction:column; gap:7px; }
  .contact-row{ display:flex; gap:12px; align-items:baseline; font-size:14px; }
  .contact-label{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--teal-deep); width:62px; flex-shrink:0;
  }
  .contact-value a{ text-decoration:none; border-bottom:1px solid transparent; }
  .contact-value a:hover{ border-bottom-color:var(--teal-deep); color:var(--teal-deep); }

  .link-tiles{ display:flex; gap:12px; flex-shrink:0; }
  .link-tile{
    width:84px; height:84px;
    border:1.5px solid var(--ink);
    background:var(--panel);
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:6px;
    font-family:var(--font-mono); font-size:11.5px; letter-spacing:.03em;
    text-transform:uppercase; text-decoration:none; color:var(--ink);
    transition:transform .15s ease, background-color .15s ease, color .15s ease, box-shadow .15s ease;
  }
  .link-tile:hover{ background:var(--teal); border-color:var(--teal); color:#fff; transform:translateY(-2px); box-shadow:var(--shadow); }

  @media (max-width:640px){
    .profile-header{ flex-direction:column; align-items:center; text-align:center; }
    .identity{ display:flex; flex-direction:column; align-items:center; }
    .contact-row{ justify-content:center; }
    .link-tiles{ align-self:center; }
  }

  /* ---------- Tabs ---------- */
  .tabs{ display:flex; gap:6px; margin:0; padding:0 0 0 2px; list-style:none; overflow-x:auto; overflow-y:hidden; }
  .tab-btn{
    font-family:var(--font-display); font-size:16px; font-weight:600;
    padding:11px 22px; border:1.0px solid var(--ink); border-radius:5px 5px 0 0;
    background:var(--paper); color:var(--ink-70); cursor:pointer; white-space:nowrap;
    position:relative; transform:translateY(2px);
    transition:transform .15s ease, background-color .15s ease, color .15s ease, border-color .15s ease;
  }
  .tab-btn:hover{ color:var(--ink); background:#2e2f37; }
  .tab-btn[aria-selected="true"]{
    background:var(--panel); color:var(--ink); border-bottom-color:var(--panel);
    transform:translateY(0); z-index:3; box-shadow:inset 0 3px 0 var(--clay);
  }

  /* ---------- Panel ---------- */
  .panel-wrap{ border:1.5px solid var(--ink); background:var(--panel); padding:40px; position:relative; z-index:1; }
  .panel[hidden]{ display:none; }
  .panel h2{ font-family:var(--font-display); font-size:26px; margin:0 0 16px; }
  .panel h3{ font-family:var(--font-display); font-size:20px; margin:28px 0 10px; }
  .panel h4{ font-family:var(--font-display); font-size:17px; margin:20px 0 8px; }
  .panel p{ margin:0 0 16px; }
  .panel ul{ margin:0 0 16px 20px; padding:0; }
  .panel li{ margin-bottom:6px; }
  .panel img{ border:1.5px solid var(--ink); margin:10px 0 18px; display:block; }
  .panel a{ color:var(--teal-deep); text-decoration-color:rgba(91,63,160,.4); }
  .panel a:hover{ text-decoration-color:var(--teal-deep); }
  .panel code{ font-family:var(--font-mono); background:rgba(232,233,238,.10); padding:2px 5px; border-radius:3px; font-size:.9em; }
  .panel-intro{ color:var(--muted); font-size:15px; margin-bottom:26px; padding-bottom:20px; border-bottom:1px dashed var(--line-strong); }

  /* ---------- Research accordion ---------- */
  .project{ border:1.5px solid var(--ink); margin-bottom:14px; background:#2a2b32; }
  .project-toggle{
    width:100%; display:flex; justify-content:space-between; align-items:flex-start; gap:16px;
    padding:16px 20px; background:none; border:none; cursor:pointer; text-align:left;
  }
  .project-title{ font-family:var(--font-display); font-size:17px; font-weight:600; }
  .project-meta{ display:block; margin-top:5px; font-family:var(--font-mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--teal-deep); font-weight:500; }
  .project-indicator{ font-family:var(--font-mono); font-size:22px; line-height:1; color:var(--clay); flex-shrink:0; width:18px; text-align:center; }
  .project-body{ padding:2px 20px 20px; border-top:1px dashed var(--line-strong); }
  .project-body[hidden]{ display:none; }

  /* ---------- Gallery ---------- */
  .gallery-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:14px; }
  .gallery-item{
    border:1.5px solid var(--ink); cursor:pointer; padding:0; background:none;
    aspect-ratio:1/1; overflow:hidden; position:relative; display:block; width:100%;
  }
  .gallery-item img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .2s ease; }
  .gallery-item:hover img{ transform:scale(1.05); }
  .gallery-caption{
    position:absolute; left:0; right:0; bottom:0; padding:9px 10px;
    background:linear-gradient(to top, rgba(36,37,44,.88), transparent);
    color:#fff; font-family:var(--font-mono); font-size:11px; text-align:left;
  }
  .gallery-badge{
    position:absolute; top:8px; right:8px; background:var(--clay); color:#fff;
    font-family:var(--font-mono); font-size:9.5px; padding:2px 6px;
    text-transform:uppercase; letter-spacing:.05em;
  }

  /* ---------- Lightbox ---------- */
  .lightbox{ position:fixed; inset:0; background:rgba(36,37,44,.92); display:flex; align-items:center; justify-content:center; padding:32px; z-index:50; }
  .lightbox[hidden]{ display:none; }
  .lightbox-content{ max-width:820px; width:100%; max-height:86vh; background:var(--panel); border:1.5px solid var(--ink); padding:22px; position:relative; overflow-y:auto; }
  .lightbox-content img, .lightbox-content video{ width:100%; max-height:62vh; object-fit:contain; display:block; border:1px solid var(--line-strong); background:#000; }
  .lightbox-caption{ margin-top:14px; font-family:var(--font-mono); font-size:13px; color:var(--muted); }
  .lightbox-note{ margin-top:8px; font-size:12.5px; color:var(--muted); font-style:italic; }
  .lightbox-close{
    position:absolute; top:-16px; right:-16px; width:36px; height:36px; border-radius:50%;
    background:var(--panel); color:var(--ink); border:1.5px solid var(--ink); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .lightbox-close:hover{ background:var(--clay); color:#1b1c22; border-color:var(--clay); }

  /* ---------- Blog ---------- */
  .post-list{ display:flex; flex-direction:column; gap:22px; }
  .post-summary{ border-bottom:1px dashed var(--line-strong); padding-bottom:20px; }
  .post-date{ font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal-deep); }
  .post-title-btn{
    display:block; background:none; border:none; padding:6px 0 8px; text-align:left; cursor:pointer;
    font-family:var(--font-display); font-size:21px; font-weight:600; color:var(--ink);
  }
  .post-title-btn:hover{ color:var(--teal-deep); text-decoration:underline; }
  .post-excerpt{ color:var(--muted); margin:0; }
  .back-link{
    font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--teal-deep); background:none; border:none; cursor:pointer; padding:0;
    margin-bottom:22px; display:inline-flex; gap:6px; align-items:center;
  }
  .back-link:hover{ text-decoration:underline; }
  .post-full .post-date{ display:block; margin-bottom:6px; }

  /* ---------- Footer ---------- */
  .site-footer{ margin-top:40px; text-align:center; font-family:var(--font-mono); font-size:11px; color:var(--muted); letter-spacing:.04em; }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; scroll-behavior:auto !important; }
  }
</style>
</head>
<body>

<canvas id="fluid-canvas" aria-hidden="true"></canvas>
<script>
/* ---------------------------------------------------------------
   Real-time fluid simulation (stable-fluids / Navier-Stokes),
   rendered as a rising violet smoke behind the page content.
   WebGL2 required; falls back to the plain CSS gradient body
   background (already in place) when unsupported or when the
   user has requested reduced motion.
--------------------------------------------------------------- */
(function(){
  "use strict";
  var canvas = document.getElementById('fluid-canvas');
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion){ canvas.remove(); return; }

  var gl = canvas.getContext('webgl2', { alpha:true, antialias:false, depth:false, stencil:false, preserveDrawingBuffer:false, premultipliedAlpha:false });
  if (!gl || !gl.getExtension('EXT_color_buffer_float')){ canvas.remove(); return; }
  gl.getExtension('OES_texture_float_linear');

  // ---- tunables ----
  var SIM_RESOLUTION = 128;
  var DYE_RESOLUTION = 512;
  var PRESSURE_ITERATIONS = 20;
  var VELOCITY_DISSIPATION = 0.4;    // per-second decay
  var DENSITY_DISSIPATION = 0.085;   // per-second decay (dye lingers ~12s so plumes have time to climb higher)
  var CURL_STRENGTH = 10;
  var BUOYANCY = 0.075;              // upward accel scaled by local (clamped) density — kept small so smoke drifts, not rockets
  var AMBIENT_RISE = 0.012;          // tiny constant upward drift so only denser plumes really climb
  var VELOCITY_SPLAT_RADIUS = 0.03;
  var DYE_SPLAT_RADIUS = 0.06;

  function resize(){
    var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    var w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
    var h = Math.max(1, Math.floor(canvas.clientHeight * dpr));
    if (canvas.width !== w || canvas.height !== h){ canvas.width = w; canvas.height = h; }
  }
  resize();
  window.addEventListener('resize', resize);

  function getRes(resolution){
    var aspect = gl.drawingBufferWidth / gl.drawingBufferHeight;
    if (aspect < 1) aspect = 1 / aspect;
    var min = Math.round(resolution);
    var max = Math.round(resolution * aspect);
    return (gl.drawingBufferWidth > gl.drawingBufferHeight) ? { width:max, height:min } : { width:min, height:max };
  }

  function createTexture(w, h, internalFormat, format, type){
    var texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, w, h, 0, format, type, null);
    return texture;
  }

  function createFBO(w, h, internalFormat, format, type){
    var texture = createTexture(w, h, internalFormat, format, type);
    var fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
    gl.viewport(0, 0, w, h);
    gl.clear(gl.COLOR_BUFFER_BIT);
    return {
      texture:texture, fbo:fbo, width:w, height:h,
      attach:function(id){ gl.activeTexture(gl.TEXTURE0 + id); gl.bindTexture(gl.TEXTURE_2D, texture); return id; }
    };
  }

  function createDoubleFBO(w, h, internalFormat, format, type){
    var a = createFBO(w, h, internalFormat, format, type);
    var b = createFBO(w, h, internalFormat, format, type);
    return {
      width:w, height:h,
      get read(){ return a; }, set read(v){ a = v; },
      get write(){ return b; }, set write(v){ b = v; },
      swap:function(){ var t = a; a = b; b = t; }
    };
  }

  function compile(type, source){
    var shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(shader));
    return shader;
  }

  function createProgram(vsSource, fsSource){
    var program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, vsSource));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fsSource));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(program));
    var uniforms = {};
    var count = gl.getProgramParameter(program, gl.ACTIVE_UNIFORMS);
    for (var i = 0; i < count; i++){
      var info = gl.getActiveUniform(program, i);
      uniforms[info.name] = gl.getUniformLocation(program, info.name);
    }
    return {
      uniforms:uniforms,
      bind:function(){ gl.useProgram(program); }
    };
  }

  // Fullscreen quad via a real vertex buffer (more portable across drivers
  // than an attributeless gl_VertexID triangle trick).
  var quadBuffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  var quadVAO = gl.createVertexArray();
  gl.bindVertexArray(quadVAO);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  function blit(target){
    gl.bindVertexArray(quadVAO);
    if (target == null){
      gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    } else {
      gl.viewport(0, 0, target.width, target.height);
      gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
    }
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  // ---- shaders ----
  var baseVertexShader = `#version 300 es
    precision highp float;
    layout(location = 0) in vec2 aPosition;
    out vec2 vUv, vL, vR, vT, vB;
    uniform vec2 texelSize;
    void main () {
      vUv = aPosition * 0.5 + 0.5;
      vL = vUv - vec2(texelSize.x, 0.0);
      vR = vUv + vec2(texelSize.x, 0.0);
      vT = vUv + vec2(0.0, texelSize.y);
      vB = vUv - vec2(0.0, texelSize.y);
      gl_Position = vec4(aPosition, 0.0, 1.0);
    }`;

  var advectionShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv;
    out vec4 fragColor;
    uniform sampler2D uVelocity;
    uniform sampler2D uSource;
    uniform vec2 texelSize;
    uniform float dt;
    uniform float dissipation;
    uniform float clampMax;
    uniform float riseBias;
    void main () {
      vec2 vel = texture(uVelocity, vUv).xy + vec2(0.0, riseBias);
      vec2 coord = vUv - dt * vel;
      vec4 result = texture(uSource, coord);
      float decay = 1.0 + dissipation * dt;
      fragColor = clamp(result / decay, -clampMax, clampMax);
    }`;

  var divergenceShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv, vL, vR, vT, vB;
    out vec4 fragColor;
    uniform sampler2D uVelocity;
    void main () {
      float L = texture(uVelocity, vL).x;
      float R = texture(uVelocity, vR).x;
      float T = texture(uVelocity, vT).y;
      float B = texture(uVelocity, vB).y;
      vec2 C = texture(uVelocity, vUv).xy;
      if (vL.x < 0.0) L = -C.x;
      if (vR.x > 1.0) R = -C.x;
      if (vT.y > 1.0) T = -C.y;
      if (vB.y < 0.0) B = -C.y;
      float div = 0.5 * (R - L + T - B);
      fragColor = vec4(clamp(div, -20.0, 20.0), 0.0, 0.0, 1.0);
    }`;

  var curlShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv, vL, vR, vT, vB;
    out vec4 fragColor;
    uniform sampler2D uVelocity;
    void main () {
      float L = texture(uVelocity, vL).y;
      float R = texture(uVelocity, vR).y;
      float T = texture(uVelocity, vT).x;
      float B = texture(uVelocity, vB).x;
      float vorticity = R - L - T + B;
      fragColor = vec4(0.5 * vorticity, 0.0, 0.0, 1.0);
    }`;

  var vorticityShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv, vL, vR, vT, vB;
    out vec4 fragColor;
    uniform sampler2D uVelocity;
    uniform sampler2D uCurl;
    uniform float curlStrength;
    uniform float dt;
    void main () {
      float L = texture(uCurl, vL).x;
      float R = texture(uCurl, vR).x;
      float T = texture(uCurl, vT).x;
      float B = texture(uCurl, vB).x;
      float C = texture(uCurl, vUv).x;
      vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));
      force /= length(force) + 0.0001;
      force *= curlStrength * C;
      force.y *= -1.0;
      vec2 vel = texture(uVelocity, vUv).xy;
      fragColor = vec4(clamp(vel + force * dt, -0.4, 0.4), 0.0, 1.0);
    }`;

  var pressureShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv, vL, vR, vT, vB;
    out vec4 fragColor;
    uniform sampler2D uPressure;
    uniform sampler2D uDivergence;
    void main () {
      float L = texture(uPressure, vL).x;
      float R = texture(uPressure, vR).x;
      float T = texture(uPressure, vT).x;
      float B = texture(uPressure, vB).x;
      float divergence = texture(uDivergence, vUv).x;
      float pressure = (L + R + B + T - divergence) * 0.25;
      fragColor = vec4(clamp(pressure, -50.0, 50.0), 0.0, 0.0, 1.0);
    }`;

  var gradientSubtractShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv, vL, vR, vT, vB;
    out vec4 fragColor;
    uniform sampler2D uPressure;
    uniform sampler2D uVelocity;
    void main () {
      float L = texture(uPressure, vL).x;
      float R = texture(uPressure, vR).x;
      float T = texture(uPressure, vT).x;
      float B = texture(uPressure, vB).x;
      vec2 velocity = texture(uVelocity, vUv).xy;
      velocity -= vec2(R - L, T - B) * 0.5;
      fragColor = vec4(clamp(velocity, -0.4, 0.4), 0.0, 1.0);
    }`;

  var buoyancyShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv;
    out vec4 fragColor;
    uniform sampler2D uVelocity;
    uniform sampler2D uDensity;
    uniform float dt;
    uniform float buoyancy;
    uniform float ambient;
    uniform float time;
    void main () {
      vec2 vel = texture(uVelocity, vUv).xy;
      vec3 d = texture(uDensity, vUv).rgb;
      float density = min(dot(d, vec3(0.299, 0.587, 0.114)), 1.0);
      float n = sin(vUv.x * 7.0 + time * 0.5) * cos(vUv.y * 5.0 - time * 0.35);
      float lift = buoyancy * density * (1.0 + 0.4 * n) + ambient;
      vel.y += lift * dt;
      vel.x += 0.12 * n * dt;
      fragColor = vec4(clamp(vel, -0.4, 0.4), 0.0, 1.0);
    }`;

  var splatShader = `#version 300 es
    precision highp float; precision highp sampler2D;
    in vec2 vUv;
    out vec4 fragColor;
    uniform sampler2D uTarget;
    uniform float aspectRatio;
    uniform vec3 color;
    uniform vec2 point;
    uniform float radius;
    void main () {
      vec2 p = vUv - point.xy;
      p.x *= aspectRatio;
      vec3 splat = exp(-dot(p, p) / radius) * color;
      vec3 base = texture(uTarget, vUv).xyz;
      fragColor = vec4(clamp(base + splat, -4.0, 4.0), 1.0);
    }`;

  var displayShader = `#version 300 es
    precision highp float; precision mediump sampler2D;
    in vec2 vUv;
    out vec4 fragColor;
    uniform sampler2D uTexture;
    void main () {
      vec3 c = texture(uTexture, vUv).rgb;
      float a = clamp(max(max(c.r, c.g), c.b), 0.0, 1.0);
      fragColor = vec4(c * a, a);
    }`;

  var advectionProgram = createProgram(baseVertexShader, advectionShader);
  var divergenceProgram = createProgram(baseVertexShader, divergenceShader);
  var curlProgram = createProgram(baseVertexShader, curlShader);
  var vorticityProgram = createProgram(baseVertexShader, vorticityShader);
  var pressureProgram = createProgram(baseVertexShader, pressureShader);
  var gradientSubtractProgram = createProgram(baseVertexShader, gradientSubtractShader);
  var buoyancyProgram = createProgram(baseVertexShader, buoyancyShader);
  var splatProgram = createProgram(baseVertexShader, splatShader);
  var displayProgram = createProgram(baseVertexShader, displayShader);

  // ---- framebuffers ----
  var simRes = getRes(SIM_RESOLUTION);
  var dyeRes = getRes(DYE_RESOLUTION);
  var velocity = createDoubleFBO(simRes.width, simRes.height, gl.RG16F, gl.RG, gl.HALF_FLOAT);
  var density = createDoubleFBO(dyeRes.width, dyeRes.height, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT);
  var divergence = createFBO(simRes.width, simRes.height, gl.R16F, gl.RED, gl.HALF_FLOAT);
  var curl = createFBO(simRes.width, simRes.height, gl.R16F, gl.RED, gl.HALF_FLOAT);
  var pressure = createDoubleFBO(simRes.width, simRes.height, gl.R16F, gl.RED, gl.HALF_FLOAT);

  var simTexelSize = { x: 1 / simRes.width, y: 1 / simRes.height };

  function splatVelocity(x, y, dx, dy){
    gl.viewport(0, 0, velocity.width, velocity.height);
    splatProgram.bind();
    gl.uniform1i(splatProgram.uniforms.uTarget, velocity.read.attach(0));
    gl.uniform1f(splatProgram.uniforms.aspectRatio, canvas.width / canvas.height);
    gl.uniform2f(splatProgram.uniforms.point, x, y);
    gl.uniform3f(splatProgram.uniforms.color, dx, dy, 0.0);
    gl.uniform1f(splatProgram.uniforms.radius, VELOCITY_SPLAT_RADIUS);
    blit(velocity.write);
    velocity.swap();
  }

  function splatDye(x, y, color, dyeRadius){
    gl.viewport(0, 0, density.width, density.height);
    splatProgram.bind();
    gl.uniform1f(splatProgram.uniforms.aspectRatio, canvas.width / canvas.height);
    gl.uniform2f(splatProgram.uniforms.point, x, y);
    gl.uniform1i(splatProgram.uniforms.uTarget, density.read.attach(0));
    gl.uniform3f(splatProgram.uniforms.color, color[0], color[1], color[2]);
    gl.uniform1f(splatProgram.uniforms.radius, dyeRadius || DYE_SPLAT_RADIUS);
    blit(density.write);
    density.swap();
  }

  function splat(x, y, dx, dy, color, dyeRadius){
    splatVelocity(x, y, dx, dy);
    splatDye(x, y, color, dyeRadius);
  }

  function violetColor(scale){
    var t = Math.random();
    var s = scale == null ? 1 : scale;
    return [(0.26 + 0.24 * t) * s, (0.04 + 0.10 * t) * s, (0.60 + 0.22 * t) * s];
  }

  // Plumes ramp their dye concentration in gradually over a couple of
  // seconds instead of injecting it in one frame, so no visible "pop".
  var activeEmitters = [];

  function spawnPlume(){
    var x = 0.12 + Math.random() * 0.76;
    var y = -0.30 + Math.random() * 0.14;   // spawn below the visible frame
    var dx = (Math.random() - 0.5) * 0.05;
    var dy = 0.05 + Math.random() * 0.07;
    splatVelocity(x, y, dx, dy);
    activeEmitters.push({
      x: x, y: y, dx: dx, dy: dy,
      color: violetColor(0.55),
      radius: 0.11,
      age: 0,
      duration: 1.2 + Math.random() * 1.3
    });
  }

  function updateEmitters(dt){
    for (var i = activeEmitters.length - 1; i >= 0; i--){
      var e = activeEmitters[i];
      e.age += dt;
      var frac = Math.min(dt / e.duration, 1);
      splatDye(e.x, e.y, [e.color[0] * frac, e.color[1] * frac, e.color[2] * frac], e.radius);
      e.x += e.dx * dt;
      e.y += e.dy * dt;
      if (e.age >= e.duration) activeEmitters.splice(i, 1);
    }
  }

  // seed a bed of purple along the bottom, plus a few starter plumes
  for (var bx = 0.06; bx <= 0.96; bx += 0.11){
    splat(bx, 0.02 + Math.random() * 0.02, (Math.random() - 0.5) * 0.015, 0.015, violetColor());
  }
  for (var s = 0; s < 6; s++) spawnPlume();

  var lastTime = performance.now();
  var splatTimer = 0.6;

  function step(dt){
    gl.disable(gl.BLEND);

    gl.viewport(0, 0, simRes.width, simRes.height);

    curlProgram.bind();
    gl.uniform2f(curlProgram.uniforms.texelSize, simTexelSize.x, simTexelSize.y);
    gl.uniform1i(curlProgram.uniforms.uVelocity, velocity.read.attach(0));
    blit(curl);

    vorticityProgram.bind();
    gl.uniform2f(vorticityProgram.uniforms.texelSize, simTexelSize.x, simTexelSize.y);
    gl.uniform1i(vorticityProgram.uniforms.uVelocity, velocity.read.attach(0));
    gl.uniform1i(vorticityProgram.uniforms.uCurl, curl.attach(1));
    gl.uniform1f(vorticityProgram.uniforms.curlStrength, CURL_STRENGTH);
    gl.uniform1f(vorticityProgram.uniforms.dt, dt);
    blit(velocity.write);
    velocity.swap();

    buoyancyProgram.bind();
    gl.uniform1i(buoyancyProgram.uniforms.uVelocity, velocity.read.attach(0));
    gl.uniform1i(buoyancyProgram.uniforms.uDensity, density.read.attach(1));
    gl.uniform1f(buoyancyProgram.uniforms.dt, dt);
    gl.uniform1f(buoyancyProgram.uniforms.buoyancy, BUOYANCY);
    gl.uniform1f(buoyancyProgram.uniforms.ambient, AMBIENT_RISE);
    gl.uniform1f(buoyancyProgram.uniforms.time, lastTime / 1000);
    blit(velocity.write);
    velocity.swap();

    divergenceProgram.bind();
    gl.uniform2f(divergenceProgram.uniforms.texelSize, simTexelSize.x, simTexelSize.y);
    gl.uniform1i(divergenceProgram.uniforms.uVelocity, velocity.read.attach(0));
    blit(divergence);

    pressureProgram.bind();
    gl.uniform2f(pressureProgram.uniforms.texelSize, simTexelSize.x, simTexelSize.y);
    gl.uniform1i(pressureProgram.uniforms.uDivergence, divergence.attach(0));
    for (var i = 0; i < PRESSURE_ITERATIONS; i++){
      gl.uniform1i(pressureProgram.uniforms.uPressure, pressure.read.attach(1));
      blit(pressure.write);
      pressure.swap();
    }

    gradientSubtractProgram.bind();
    gl.uniform2f(gradientSubtractProgram.uniforms.texelSize, simTexelSize.x, simTexelSize.y);
    gl.uniform1i(gradientSubtractProgram.uniforms.uPressure, pressure.read.attach(0));
    gl.uniform1i(gradientSubtractProgram.uniforms.uVelocity, velocity.read.attach(1));
    blit(velocity.write);
    velocity.swap();

    advectionProgram.bind();
    gl.uniform2f(advectionProgram.uniforms.texelSize, simTexelSize.x, simTexelSize.y);
    gl.uniform1i(advectionProgram.uniforms.uVelocity, velocity.read.attach(0));
    gl.uniform1i(advectionProgram.uniforms.uSource, velocity.read.attach(0));
    gl.uniform1f(advectionProgram.uniforms.dt, dt);
    gl.uniform1f(advectionProgram.uniforms.dissipation, VELOCITY_DISSIPATION);
    gl.uniform1f(advectionProgram.uniforms.clampMax, 0.4);
    gl.uniform1f(advectionProgram.uniforms.riseBias, 0.0);
    blit(velocity.write);
    velocity.swap();

    gl.viewport(0, 0, dyeRes.width, dyeRes.height);
    advectionProgram.bind();
    gl.uniform2f(advectionProgram.uniforms.texelSize, simTexelSize.x, simTexelSize.y);
    gl.uniform1i(advectionProgram.uniforms.uVelocity, velocity.read.attach(0));
    gl.uniform1i(advectionProgram.uniforms.uSource, density.read.attach(1));
    gl.uniform1f(advectionProgram.uniforms.dt, dt);
    gl.uniform1f(advectionProgram.uniforms.dissipation, DENSITY_DISSIPATION);
    gl.uniform1f(advectionProgram.uniforms.clampMax, 8.0);
    gl.uniform1f(advectionProgram.uniforms.riseBias, 0.055);
    blit(density.write);
    density.swap();
  }

  function render(){
    displayProgram.bind();
    gl.uniform1i(displayProgram.uniforms.uTexture, density.read.attach(0));
    blit(null);
  }

  var __frameCount = 0;
  function frame(now){
    var dt = Math.min((now - lastTime) / 1000, 0.033);
    lastTime = now;

    splatTimer -= dt;
    if (splatTimer <= 0){
      spawnPlume();
      splatTimer = 0.5 + Math.random() * 0.7;
    }
    updateEmitters(dt);

    step(dt);
    render();
    __frameCount++;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>

  /* ---------------------------------------------------
     Tiny placeholder-image generator (inline SVG data URI).
     Replace any of these with real photos/videos — just
     swap the `src` / `video` fields in the data below.
  --------------------------------------------------- */
  function ph(label, color, w, h){
    w = w || 480; h = h || 320;
    var safe = String(label).replace(/&/g,'&amp;').replace(/</g,'&lt;');
    var svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + w + "' height='" + h + "'>" +
      "<rect width='100%' height='100%' fill='#" + color + "'/>" +
      "<text x='50%' y='50%' font-family='monospace' font-size='16' fill='#ffffff' " +
      "text-anchor='middle' dominant-baseline='middle'>" + safe + "</text></svg>";
    return "data:image/svg+xml," + encodeURIComponent(svg);
  }

  /* ---------------------------------------------------
     Minimal markdown renderer — headings, bold/italic,
     links, images, inline code, and bullet lists.
     Enough to let any panel below "support rich markdown
     format" (the brief's words) without an external library.
  --------------------------------------------------- */
  function inline(text){
    text = text.replace(/!\[([^\]]*)\]\(((?:[^()]|\([^()]*\))*)\)/g, '<img src="$2" alt="$1" loading="lazy">');
    text = text.replace(/\[([^\]]+)\]\(((?:[^()]|\([^()]*\))*)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    return text;
  }

  function renderMarkdown(md){
    var lines = md.trim().split('\n');
    var html = '', para = [], inList = false;

    function flushPara(){
      if (para.length){ html += '<p>' + inline(para.join(' ')) + '</p>'; para = []; }
    }

    lines.forEach(function(raw){
      var line = raw.trim();
      if (line === ''){
        flushPara();
        if (inList){ html += '</ul>'; inList = false; }
        return;
      }
      var h = line.match(/^(#{1,4})\s+(.*)/);
      if (h){
        flushPara();
        if (inList){ html += '</ul>'; inList = false; }
        var level = Math.min(h[1].length + 1, 4);
        html += '<h' + level + '>' + inline(h[2]) + '</h' + level + '>';
        return;
      }
      var li = line.match(/^[-*]\s+(.*)/);
      if (li){
        flushPara();
        if (!inList){ html += '<ul>'; inList = true; }
        html += '<li>' + inline(li[1]) + '</li>';
        return;
      }
      para.push(line);
    });
    flushPara();
    if (inList) html += '</ul>';
    return html;
  }

    lastFocused = document.activeElement;
    if (item.type === 'video'){
      var video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.poster = ph(item.title, item.color, 800, 450);
      if (item.video){
        var source = document.createElement('source');
        source.src = item.video;
        video.appendChild(source);
      }
      lightboxMedia.innerHTML = '';
      lightboxMedia.appendChild(video);
      lightboxCaption.innerHTML = item.title + (item.video ? '' :
        '<br><span class="lightbox-note">Add a video file path to this item\'s `video` field in the code to enable playback.</span>');
    } else {
      lightboxMedia.innerHTML = '<img src="' + ph(item.title, item.color, 900, 560) + '" alt="' + item.title + '">';
      lightboxCaption.textContent = item.title;
    }
    lightbox.hidden = false;
    lightboxClose.focus();
  }

  function closeLightbox(){
    lightbox.hidden = true;
    lightboxMedia.innerHTML = '';
    if (lastFocused) lastFocused.focus();
  }

  panels.gallery.querySelectorAll('.gallery-item').forEach(function(btn){
    btn.addEventListener('click', function(){
      openLightbox(galleryItems[Number(btn.dataset.index)]);
    });
  });
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', function(e){ if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && !lightbox.hidden) closeLightbox();
  });

  /* ---------------------------------------------------
     Blog — plain text posts, click a title to read it
  --------------------------------------------------- */
  function formatDate(iso){
    var d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  }

  function renderBlogList(){
    var html = '<div class="post-list">';
    posts.forEach(function(post, i){
      html +=
        '<article class="post-summary">' +
          '<span class="post-date">' + formatDate(post.date) + '</span>' +
          '<button class="post-title-btn" data-index="' + i + '">' + post.title + '</button>' +
          '<p class="post-excerpt">' + post.excerpt + '</p>' +
        '</article>';
    });
    html += '</div>';
    panels.blog.innerHTML = html;
    panels.blog.querySelectorAll('.post-title-btn').forEach(function(btn){
      btn.addEventListener('click', function(){ renderBlogPost(Number(btn.dataset.index)); });
    });
  }

  function renderBlogPost(i){
    var post = posts[i];
    panels.blog.innerHTML =
      '<div class="post-full">' +
        '<button class="back-link">&larr; All posts</button>' +
        '<span class="post-date">' + formatDate(post.date) + '</span>' +
        '<h2>' + post.title + '</h2>' +
        renderMarkdown(post.md) +
      '</div>';
    panels.blog.querySelector('.back-link').addEventListener('click', renderBlogList);
  }

  renderBlogList();

  /* Initial tab on load */
  selectTab('about');
})();
</script>
</body>
</html>
