<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dante Lamenza Naylor — Research &amp; Notes</title>
<meta name="description" content="Personal academic site: about, research, gallery, and blog.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="fluid-canvas" aria-hidden="true"></canvas>

<noscript>This site uses JavaScript to power its tabs, project details, gallery, and blog. Please enable JavaScript to see the full content.</noscript>

<div class="page">

  <div id="header-mount"></div>

  <nav class="tabs" role="tablist" aria-label="Site sections">
    <button class="tab-btn" role="tab" id="tab-about" aria-controls="panel-about" aria-selected="true" data-tab="about">About</button>
    <button class="tab-btn" role="tab" id="tab-research" aria-controls="panel-research" aria-selected="false" tabindex="-1" data-tab="research">Research</button>
    <button class="tab-btn" role="tab" id="tab-gallery" aria-controls="panel-gallery" aria-selected="false" tabindex="-1" data-tab="gallery">Gallery</button>
    <button class="tab-btn" role="tab" id="tab-blog" aria-controls="panel-blog" aria-selected="false" tabindex="-1" data-tab="blog">Blog</button>
  </nav>

  <main class="panel-wrap">
    <section class="panel" id="panel-about" role="tabpanel" aria-labelledby="tab-about"></section>
    <section class="panel" id="panel-research" role="tabpanel" aria-labelledby="tab-research" hidden></section>
    <section class="panel" id="panel-gallery" role="tabpanel" aria-labelledby="tab-gallery" hidden></section>
    <section class="panel" id="panel-blog" role="tabpanel" aria-labelledby="tab-blog" hidden></section>
  </main>

  <footer class="site-footer">Latest update: July 2026</footer>
</div>

<div class="lightbox" id="lightbox" hidden>
  <div class="lightbox-content" role="dialog" aria-modal="true" aria-label="Media preview">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <div id="lightbox-media"></div>
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>
</div>

<script src="js/fluid-sim.js"></script>
<script src="js/main.js"></script>
</body>
</html>
